  <script
    type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is Network School?","acceptedAnswer":{"@type":"Answer","text":"Network School (NS) is a startup society—sometimes called 'Society-as-a-Service'—where builders, founders, and remote workers live together on a campus near Singapore. Think of it as a first-mover community: you're surrounded by people building in tech, Web3, and AI. It's not a formal school with grades or credentials—it's more like a luxury hacker house meets co-living meets startup boot camp. The idea is to turn online communities into physical ones, and it's the live pilot for the broader 'Network State' thesis."}},{"@type":"Question","name":"Where is Network School located?","acceptedAnswer":{"@type":"Answer","text":"NS is in Forest City, Malaysia—a $100 billion megaproject by China's Country Garden, built on artificial islands in the Johor Strait, about an hour from Singapore. The development was originally a luxury enclave for foreign investors, but market shifts left it largely empty. NS leases the undervalued luxury infrastructure—towering high-rises, marble lobbies, ocean views—at a fraction of what comparable facilities would cost in any major city. It's peaceful, green, and isolated, which is the point: fewer distractions, more focus. Singapore is close enough for conferences and city trips, and NS runs regular shuttle services."}},{"@type":"Question","name":"How much does Network School cost?","acceptedAnswer":{"@type":"Answer","text":"It's $1,500/month for a double room (shared) or $3,000/month for a single room. That covers housing, three meals a day, gym access, coworking, Starlink internet, room cleaning, laundry, and all courses and events. The café and vending machines are optional extras. For context, that's less than rent alone in SF or Singapore—and you're getting food, gym, and coworking bundled in. Day passes are also available if you're just visiting."}},{"@type":"Question","name":"What's included in the fee?","acceptedAnswer":{"@type":"Answer","text":"Pretty much everything: accommodation (rooms upwards of 50 sqm with ocean-view balconies), three Blueprint meals a day, 24/7 gym, coworking spaces, Starlink high-speed internet, room cleaning, laundry, workshops, and community events. The café and vending machines are separate if you want extra coffee or snacks. You get access to meeting rooms, a library, yoga space, and the whole campus. Zero domestic friction—you don't cook, clean, or deal with logistics."}},{"@type":"Question","name":"How long can I stay?","acceptedAnswer":{"@type":"Answer","text":"It's flexible. Some people come for a few weeks, others stay months or a full year. The program runs year-round. v1 was a 128-person 90-day popup. v2 expanded to 256 people for a full year. Cohort sizes now regularly hit 270+. There's no fixed commitment; you can extend or leave when it works for you."}},{"@type":"Question","name":"Who can join?","acceptedAnswer":{"@type":"Answer","text":"Founders, builders, digital nomads, Web3 folks, AI creators—anyone value-aligned and interested in building. NS specifically seeks three archetypes: (1) founders, engineers, designers, investors—the tech engine; (2) trainers, athletes, coaches—the fitness engine; (3) writers, artists, influencers using generative AI—the cultural engine. Age doesn't matter—there are teenage coders and fifty-something professionals. Members have seen an 80-year-old and a 7-year-old both have great experiences with daily walks and the community. Anyone fascinated by or curious about tech will fit in regardless of age. They look for fit, not credentials."}},{"@type":"Question","name":"How selective is Network School?","acceptedAnswer":{"@type":"Answer","text":"Very. During v1, NS received over 4,000 applications from 80+ countries for 128 spots—a 3.2% acceptance rate, comparable to Harvard or Stanford. They filter for value alignment and raw intellectual potential, not credentials. A referral can help but isn't required. If you're genuinely building something, that matters more than a polished resume."}},{"@type":"Question","name":"How do I apply?","acceptedAnswer":{"@type":"Answer","text":"Apply online at ns.com. Standard admission evaluates value alignment and potential. For the Fellowship track, there's a rigorous 'Form, Zoom, Room, Boom' pipeline: online application, video interview, in-person pencil-and-paper exam at the campus (to AI-proof the process), then acceptance. Be genuine about what you're building—that matters more than a polished resume."}},{"@type":"Question","name":"What is the \"Form, Zoom, Room, Boom\" process?","acceptedAnswer":{"@type":"Answer","text":"It's the four-stage pipeline for the Fellowship and long-term residencies. Form: online application with screening test and references. Zoom: video interview assessing integrity and agency. Room: in-person, pencil-and-paper exam at the campus—no digital aids, to confirm your raw cognitive abilities. Boom: acceptance and relocation. Standard admission is simpler (mainly Form + review), but the Fellowship pipeline is deliberately rigorous."}},{"@type":"Question","name":"Do I need a referral to get in?","acceptedAnswer":{"@type":"Answer","text":"No, but it can help. Applications are reviewed on their own; a referral might give you a nudge. If you know someone who's been, ask them. If not, apply anyway—your story and what you're building matter more."}},{"@type":"Question","name":"What is Learn, Earn, Burn, and Fun?","acceptedAnswer":{"@type":"Answer","text":"The four pillars of NS—and they call the whole thing 'Willpower-as-a-Service.' Learn: pick up frontier skills—AI, crypto, DeFi, or whatever you're into, via two tracks (Power Users and Programmers). Earn: work remotely, build your thing, earn crypto bounties. Burn: gym, HIIT classes, fitness combine—NS partnered with Bryan Johnson's Blueprint protocol. Fun: community dinners, events, spontaneous hangouts. The environment is engineered so peak performance is the path of least resistance."}},{"@type":"Question","name":"What's a typical day at Network School?","acceptedAnswer":{"@type":"Answer","text":"Morning: wake up, hit the gym or a HIIT class (7 AM, 11 AM, or 5 PM slots), Blueprint breakfast. Then head to the coworking space—everyone's doing their own thing. Afternoon: optional sessions (vibe coding, book club, DeFi 101, bug bounty hunting, whatever members teach), side projects, or deep work. Evening: community dinner, maybe a small event or just hanging out. Alcohol is minimal; caffeine is the drug of choice. It's structured but flexible—you design your day."}},{"@type":"Question","name":"Is Network School actually a school?","acceptedAnswer":{"@type":"Answer","text":"Not in the traditional sense. No fixed curriculum, no grades, no paper degrees. Members teach each other—one-hour seminars on whatever they're into. The staff runs a few core sessions, but most learning is peer-to-peer. Instead of diplomas, you earn 'cryptocredentials'—NFTs that prove you completed tasks and populate your profile on GitHub or Replit. 'School' is more of a brand than a description."}},{"@type":"Question","name":"What learning tracks are available?","acceptedAnswer":{"@type":"Answer","text":"Two main tracks in the v2 program: Power Users learn to orchestrate AI and crypto tools to automate complex workflows—think combining ChatGPT, Midjourney, and Solana into a product. Programmers go deep: intensive hackathons using specific APIs like Solana, Ollama, and Midjourney to build deployable apps. Plus member-led sessions on anything from filmmaking to fundraising."}},{"@type":"Question","name":"What are cryptocredentials?","acceptedAnswer":{"@type":"Answer","text":"Non-transferable NFTs that prove you completed learning modules or tasks at NS. Think of them as blockchain-verified certificates—they automatically populate your 'cryptoresume' on developer platforms like GitHub or Replit. Instead of a paper diploma, you build a verifiable portfolio of work that investors and employers can check. Also: you earn 'proof-of-workout' NFTs from gym sessions."}},{"@type":"Question","name":"Can I earn money while at Network School?","acceptedAnswer":{"@type":"Answer","text":"Yes. NS offers daily $1,000 crypto bounties for completing tasks—code contributions, bug bounties, AI content, solving technical challenges. Some people offset their entire tuition this way. The campus also attracts visiting VCs and investors who come specifically to scout talent, and programs like Monad Founder Residency distribute incentives directly. Between bounties, remote work, and networking with capital, there are real earning opportunities."}},{"@type":"Question","name":"What is the NS Fellowship?","acceptedAnswer":{"@type":"Answer","text":"A $100,000 funding package for top-tier applicants to bootstrap or accelerate a startup. The condition: relocate to the NS campus for one year. Startups are typically incorporated in Singapore, leveraging its legal framework and VC proximity. It's closer to a seed round than a scholarship—you get capital, a zero-friction building environment, potential co-founders, and early-adopter beta-testers all under one roof."}},{"@type":"Question","name":"What's the food like?","acceptedAnswer":{"@type":"Answer","text":"Three Blueprint-inspired meals are included daily. Breakfast runs 7–10 AM at the hotel lobby—buffet style. Lunch is a packed boxed meal (dry-style) that you can pick up around 12–2 PM whenever you want to eat; it includes nutty potato and banana pudding, which are delicious and high in protein. Dinner is a hot buffet from 5:30–7:30 PM. There are solid options for both vegetarians and non-vegetarians. Everything is optimized for longevity and cognitive performance—lean proteins, vegetables, nuts, berries. You can check full nutrition facts at ns.com/nutrition. Some people love it; others find it bland compared to their usual diet. Beyond the included meals, the NS Café lets you order extras online at ns.com/food and pick up at the counter. Water stations are throughout the campus, and you can buy NS bottles and mugs at the café. If you want groceries, there are nearby stores that accept GrabPay and foreign credit cards (excluding Amex), plus the hotel provides bottled water."}},{"@type":"Question","name":"What's the gym like?","acceptedAnswer":{"@type":"Answer","text":"Built from scratch for NS, partnered with Bryan Johnson's Blueprint program. Well-equipped with weights, cardio, and space for group classes. HIIT sessions run a few times daily (7 AM, 11 AM, 5 PM). They run a 'fitness combine'—AI-powered measurement of push-ups, balance, grip strength, body composition, and VO2 max at the start and end of your stay. You earn proof-of-workout NFTs for completing sessions. A lot of people say the gym was a big reason they came."}},{"@type":"Question","name":"What sports are available at Network School?","acceptedAnswer":{"@type":"Answer","text":"NS has solid sports options. On campus, there's a very nice table tennis table—great for quick games. Inside the gym, the space is spacious enough that people set up nets and play badminton regularly; it's a popular choice. Within about 100 meters of NS there's a basketball court with infrastructure to put up nets—some members use it for pickleball too. At least two swimming pools are very close and easily accessible. Combined with the gym (weights, cardio, HIIT), you've got table tennis, badminton, basketball, pickleball, and swimming all within reach."}},{"@type":"Question","name":"What is NS Haven?","acceptedAnswer":{"@type":"Answer","text":"Haven is NS's dedicated wellness space—think of it as 'heart infrastructure.' The gym is for the body, the library and coworking are for the head, and Haven is for the heart. It's a soft space for mindfulness, meditation, yoga, and just unwinding. It comes equipped with lush carpets, a massage chair (bookable), a large couch, meditation cushions, aromatherapy, and custom lighting and audio setups. After days of intense building and locking in, Haven is where people go to decompress and rebalance. Members also run sessions there—sound baths, somatic experiences, guided meditation."}},{"@type":"Question","name":"Is alcohol common at Network School?","acceptedAnswer":{"@type":"Answer","text":"Minimal. The longevity and fitness culture means alcohol is generally frowned upon as counterproductive. Caffeine is the dominant substance—long hours, deep technical debates, and lots of coffee. If you're looking for a party scene, this isn't it. The geographic isolation reinforces the heads-down vibe during the week. Weekends in Singapore offer more variety if you want it."}},{"@type":"Question","name":"What are the rooms like?","acceptedAnswer":{"@type":"Answer","text":"All rooms are at the Forest City Marina Hotel and come with a private bathroom with toiletries, free WiFi, air conditioning, flat-screen TV, in-room safe, hair dryer, electric kettle, mini-fridge, and a balcony or opening windows. There are two types: Twin Bedrooms for NS Basic (shared with a roommate—two separate beds) and King Bedrooms reserved for couples or those upgrading to a private room. Bathrooms are the same quality in both. If you're bringing a child, an extra small bed is available for a small monthly fee—just ask NS staff. Long-term residents may get two-bedroom apartments with more space. The whole setup is designed to eliminate domestic friction so you can focus entirely on building."}},{"@type":"Question","name":"Is room cleaning and laundry included?","acceptedAnswer":{"@type":"Answer","text":"Room cleaning is included in the monthly fee. For laundry, there's a wash-and-dry service that collects from the hotel lobby at 8:45 AM daily (except Sunday) and returns the next day at the same time. Pricing is affordable—around RM 28–58 per load depending on size (14kg or 28kg) and whether you mix or separate darks and lights. Detergent is included. You can also choose water temperature and dryer heat level. It's not free, but it's cheap and convenient—you drop it off, pick it up, done. Zero domestic friction is the whole idea."}},{"@type":"Question","name":"Are there private pods or offices at Network School?","acceptedAnswer":{"@type":"Answer","text":"Yes. If the open coworking space isn't enough, NS offers private workspaces. There's an hourly pod in the NS Café—first come, first served, book one-hour slots via a QR code on the pod itself. Good for private calls or quick meetings. For something more permanent, you can rent a Private NS Pod ($200/month—table and monitor) or a Private NS Office ($400/month—standing desk, office chair, and monitor). Pods are in the café area; offices are in the library and coworking spaces. These are on top of the base membership fee, but worth it if you need a locked-in, dedicated workspace."}},{"@type":"Question","name":"How fast is the internet at Network School?","acceptedAnswer":{"@type":"Answer","text":"Starlink-powered—100 to 400 Mbps download, with latency as low as 25 to 60 milliseconds. That's fast enough for 4K video conferencing, continuous code deployment, cloning large GitHub repos, and even high-frequency trading. Starlink bypasses the local terrestrial infrastructure limitations of Forest City. It's reliable (99.9% uptime) and weather-resilient. You won't miss your home internet."}},{"@type":"Question","name":"What kind of people attend?","acceptedAnswer":{"@type":"Answer","text":"A mix: founders, digital nomads, Web3 builders, AI creators, remote workers, former military, academic professors, teenage coders. Very international—70+ nationalities, with strong representation from India, the US, Europe, Southeast Asia, and the Middle East. Demographics skew male (around 80%). Some have moved their offices here; others are figuring out their next move. It's a cultural smorgasbord."}},{"@type":"Question","name":"What is \"Dark Talent\"?","acceptedAnswer":{"@type":"Answer","text":"Like dark matter in physics—it's everywhere but invisible to traditional systems. Dark talent is the massive global pool of high-potential individuals disconnected from elite institutions. Indian engineers, African founders, American Midwest makers, Latin American libertarians—people with raw ability who never had a shot at Stanford or YC. NS exists specifically to surface them. Traditional universities sort by credentials; NS sorts by capability and drive."}},{"@type":"Question","name":"What's the gender ratio?","acceptedAnswer":{"@type":"Answer","text":"Honestly, it's mostly guys—around 80% male. That comes with a merit-based admission system that doesn't factor in demographics. Some single guys have mentioned the ratio and head to Singapore on weekends. It's something to be aware of if it matters to you. The community is working on it, but it's a known dynamic."}},{"@type":"Question","name":"What's the culture like?","acceptedAnswer":{"@type":"Answer","text":"'Win and help win'—people share knowledge, teach classes, support each other. About 60% of members run sessions for others. There's a 'leave NS better than you found it' ethos. The ideological baseline is technocapitalism: belief in technological acceleration, free-market principles, and internationalism. That said, like any community, there are a few less social types. Overall the vibe is generous, collaborative, and intensely focused."}},{"@type":"Question","name":"Are there cliques or is it hard to break in?","acceptedAnswer":{"@type":"Answer","text":"Some ethnic and language-based groups do form—especially among Hindi and Mandarin speakers. Even extroverts can find it tricky to break into those circles. The flip side: 70+ nationalities, so it's still a UN of sorts. Cliques tend to form more among short-termers; people who stay longer usually mix more. It's something to be aware of, not a dealbreaker."}},{"@type":"Question","name":"Is Network School political?","acceptedAnswer":{"@type":"Answer","text":"No. It's oriented toward the private sector—building companies, not governments. You might hear about network states as a concept, but there's no political organizing or activism. It's teaching by example: the living community is the lesson. The ideological filter is technocapitalist and internationalist, but the output is startups, not policy."}},{"@type":"Question","name":"Which airport should I fly into for Network School?","acceptedAnswer":{"@type":"Answer","text":"You have three main options. Singapore Changi is the most connected and best if you have (or can get) a Singapore visa. NS runs a bus from Changi to Forest City on the 1st of every month—ideal for first-time visitors. Johor Bahru (Senai) is about 45 minutes by bus but has fewer flight options; good if you want to avoid a Singapore visa. Kuala Lumpur is a longer journey but works if you can't get a Singapore visa or Johor Bahru flights don't suit you. Grab and cab providers can pick you up from Singapore (some only from the city, not the airport). Cross-border buses run frequently and are the most structured way to reach NS. If you're coming via Singapore for the first time, the NS-organized bus from Changi on the 1st is usually the smoothest option."}},{"@type":"Question","name":"How do I get to Singapore from Network School?","acceptedAnswer":{"@type":"Answer","text":"NS runs regular shuttle services. The bus stand is about a 5-minute walk from NS; buses run roughly every hour to and from Singapore. One-way cost is around 5 MYR to Singapore and around 5 SGD from Singapore to Forest City. The bus drops you at Singapore's MRT, so onward connectivity is excellent. But be realistic: plan 1.5 to 2 hours each way. You disembark at Malaysian checkpoint, clear exit immigration, cross the bridge, clear Singapore entry immigration, then transit onward. There are also cross-border buses (CW6, FC1) connecting to Singapore's MRT. It works for Token2049, conferences, or weekend trips—but daily commuting is impractical due to double border crossing."}},{"@type":"Question","name":"How do I get around Forest City?","acceptedAnswer":{"@type":"Answer","text":"Mostly Grab—ride-hailing is the main option. Public transport is limited. The area is developing, so daily convenience isn't like Singapore. That said, the core NS facilities—Coworking, Lobby, Café, and Gym—are all walkable within the Forest City complex (see map below). You're not constantly moving around; the campus is self-contained. Bring some Malaysian ringgit for Grab rides and local errands."}},{"@type":"Question","name":"What restaurants and shops are near Network School?","acceptedAnswer":{"@type":"Answer","text":"Within walking distance you'll find Thai restaurants, a bar and pub with pool, Singha, and places for Indian, Korean, and Japanese food. There's a good coffee shop nearby. Multiple 24/7 convenience stores within ~200m stock snacks, toiletries, and everyday items. Grab is available 24/7. Online delivery and e-commerce work normally. You won't run short of options."}},{"@type":"Question","name":"Is Forest City isolated? Can I get food delivery and groceries?","acceptedAnswer":{"@type":"Answer","text":"No. Forest City isn't isolated. Grab runs 24/7. You can order food via apps and use e-commerce for groceries and other items. Multiple 24/7 convenience stores are within ~200m of NS for snacks, toiletries, and everyday essentials. You won't feel cut off."}},{"@type":"Question","name":"Is Forest City a ghost town?","acceptedAnswer":{"@type":"Answer","text":"It's a developing area—modern buildings, lots of green space, but not densely populated. Many buildings are empty. Media has called it a 'ghost town,' but it's not dirty or chaotic—and it's not spooky or abandoned. Thousands of people live in Forest City. Staff maintain everything. Chinese signage is everywhere (the original target market). NS has created a lively pocket within it: Thai restaurants, a bar and pub with pool, Singha, Indian/Korean/Japanese food, a good coffee shop within walking distance, and multiple 24/7 convenience stores within ~200m for snacks, toiletries, and FMCG. Grab runs 24/7; online delivery and e-commerce work normally. New shops are opening. If you want a bustling city, this isn't it. If you want focus and fewer distractions, it works."}},{"@type":"Question","name":"How much crypto is used at Network School?","acceptedAnswer":{"@type":"Answer","text":"Less than you might expect for day-to-day life. You get an NFT in your Solana wallet when accepted, you can pay for café items with crypto, bounties are paid in crypto, and you earn proof-of-workout NFTs. But rent and meals aren't paid in crypto. The Web3 vibe is in the people, ideas, and programs (Solana Superteam, Monad Residency)—the daily infrastructure is still mostly traditional."}},{"@type":"Question","name":"Do I need a visa?","acceptedAnswer":{"@type":"Answer","text":"Most nationalities use a standard tourist visa for Malaysia. Indian nationals get visa-free entry for up to 30 days (through Dec 2026). Others use eVisa or eNTRI programs (15–30 days). For longer stays, the DE Rantau Digital Nomad Pass is the best option—3 to 12 months, renewable to 24. Check your country's requirements for both Malaysia and Singapore."}},{"@type":"Question","name":"What is the DE Rantau Digital Nomad Pass?","acceptedAnswer":{"@type":"Answer","text":"Malaysia's official digital nomad visa. Gives you 3 to 12 months of legal residency, renewable up to 24 months total. Requires $24,000/year income and costs ~MYR 1,000 (plus MYR 500 per dependent). Your spouse and kids can come too. It lets you work remotely legally—no visa runs, no anxiety. Way better than juggling 30-day tourist stamps. The income threshold is low compared to European or Japanese nomad visas."}},{"@type":"Question","name":"Are visa runs viable?","acceptedAnswer":{"@type":"Answer","text":"Technically possible—exit to Singapore, re-enter Malaysia for a fresh stamp. But risky. Immigration uses advanced tracking, and a pattern of repeated border crossings to extend tourist status is illegal. You can get flagged, interrogated, denied entry, or banned. The DE Rantau pass is the safer, legal option for anything beyond a single 30-day stay. Don't rely on visa runs."}},{"@type":"Question","name":"Do I need health insurance?","acceptedAnswer":{"@type":"Answer","text":"Yes, for longer stays. EMGS-approved plans cost $100–$210/year with low deductibles ($5–$11 per visit). Providers like Great Eastern Takaful and Etiqa offer inpatient, outpatient, and emergency evacuation coverage. Malaysia has excellent healthcare infrastructure—it's a top medical tourism destination. Short-term visitors can use international travel insurance. Either way, don't come uninsured."}},{"@type":"Question","name":"What medical and healthcare facilities are near Network School?","acceptedAnswer":{"@type":"Answer","text":"You're well covered. There are local clinics right in Forest City for everyday stuff—minor illnesses, quick checkups. For anything more serious, there are multiple full-service hospitals within driving distance in Johor Bahru, including international-standard ones with specialist departments and emergency care. There's also a women's clinic nearby. Pharmacies are accessible in the area, some with WhatsApp ordering for convenience. Malaysia's emergency number is 999. Before you come, make sure your health insurance covers you in Malaysia—if it doesn't, nomad insurance providers like World Nomads, Insured Nomads, or SafetyWing are popular options among NS members. Malaysia is a top medical tourism destination, so the quality of care is excellent and affordable."}},{"@type":"Question","name":"Good for digital nomads with Singapore visa issues?","acceptedAnswer":{"@type":"Answer","text":"Yes. Malaysia is much more welcoming to immigration. If you or your team have had Singapore employment pass issues, Forest City is close and the DE Rantau pass makes it legal. NS works well as a base for global teams who can't all get Singapore visas. Several members are there specifically for this reason."}},{"@type":"Question","name":"What programs and events run at Network School?","acceptedAnswer":{"@type":"Answer","text":"Solana Superteam ran a six-week Ignition incubation residency. Monad had a three-week Founder Residency. There are hackathons, book clubs, vibe coding sessions, DeFi 101, AI discussions—lots of member-led stuff. Guest speakers include the caliber of ByteDance's first investor. The school also hosts VC office hours for fundraising and career counseling. Zcash and Polystate run recurring office hours on campus. All events are organized through Luma (luma.com/ns) where anyone can submit sessions pending admin approval."}},{"@type":"Question","name":"What kind of daily events and sessions happen at NS?","acceptedAnswer":{"@type":"Answer","text":"There's something happening almost every hour—all organized through the NS Luma calendar (luma.com/ns) and anyone can propose a session. On any given day you might find: fitness sessions (beach sprints, swim club, tennis classes for all levels, kids gym for 8–12 year olds), wellness (45-minute meditation, sound baths, somatic experiences, a ladies-only wellness circle), learning (MBA in a Box, nutrition deep dives, longevity surgeon talks, how to grow to 150K followers, consciousness research), crypto/Web3 office hours (Zcash, Polystate, startup office hours), social (coffee raves, sun club by the pool, Chinese conversation hour), and practical sessions (how to lead a session at NS, trips office hours for organizing group outings). Events happen across the NS Library, NS Café, NS Gym, the pool, hotel VIP rooms, and even nearby courts for tennis. Popular sessions sell out or hit near capacity, so booking early on Luma helps. The vibe is bottom-up: members create most of the programming, and the community decides what sticks."}},{"@type":"Question","name":"Can I bring my family?","acceptedAnswer":{"@type":"Answer","text":"Yes. Families and kids are welcome—people of all ages are at NS. Some members have brought children for hackathons and events. The DE Rantau pass allows dependents (MYR 500 each). Family integration is a work in progress—the more families participate, the easier it gets. If you're considering it, check on current family participation levels before you come."}},{"@type":"Question","name":"Is Network School good for Ramadan?","acceptedAnswer":{"@type":"Answer","text":"It can be tricky. Meal timings, food availability, and gym schedules aren't designed around fasting hours. Some members observing Ramadan have found it challenging. The team could tailor for specific groups, but it hasn't been a default priority. If you're observing Ramadan, ask about accommodations before you come."}},{"@type":"Question","name":"Can I use credit cards?","acceptedAnswer":{"@type":"Answer","text":"At NS facilities, yes. In Forest City more broadly, many small shops prefer cash (Malaysian ringgit). There are ATMs with no withdrawal fees in the NS area. Cross-border buses to Singapore accept the ManjaLink cashless card. For your main expenses—accommodation, meals—you're covered by the monthly fee. Bring some cash for local errands."}},{"@type":"Question","name":"What's the ROI vs a university or coding bootcamp?","acceptedAnswer":{"@type":"Answer","text":"A four-year CS degree costs $100K–$150K+ in tuition alone, plus living expenses, and delays earnings by four years. A coding bootcamp costs $10K–$20K for 3–6 months but doesn't cover living. NS costs $3K–$12K for 3–12 months and includes housing, food, gym, and internet—plus immediate earning opportunities via daily bounties and VC access. The actual cost of NS is arguably negative relative to maintaining an existence in SF or NYC when you factor in eliminated expenses."}},{"@type":"Question","name":"What makes NS different from YC or accelerators?","acceptedAnswer":{"@type":"Answer","text":"NS isn't an accelerator—no demo day, no batch structure, no equity taken. It's a semi-permanent community. YC competes for credentialed talent; NS welcomes dark talent. YC gives you 3 months of advice and funding; NS gives you a living environment where peak performance is the default. It's more like a venture fund (discrete cohorts) than a school. You're living and building alongside peers, not being 'accelerated' through a pipeline."}},{"@type":"Question","name":"Is Network School safe?","acceptedAnswer":{"@type":"Answer","text":"Yes. You're near Singapore, one of the safest places in the world. The campus is in a planned development with security and maintenance. The community has written principles and expectations. Healthcare is excellent and cheap ($100–$210/year for full insurance). It's a high-trust environment—people feel comfortable walking around at night, working late, and leaving stuff in common areas."}},{"@type":"Question","name":"Who should NOT go to Network School?","acceptedAnswer":{"@type":"Answer","text":"If you want vibrant nightlife, spontaneous urban energy, or a relaxing vacation—skip it. The isolation of Forest City means maintaining external social relationships takes effort. If you're not comfortable with an intense, fitness-first, ideology-aligned community where your schedule and environment are optimized by design, it'll feel constraining. You need to embrace the 'Proof of Work' culture. If you're not building or seriously exploring, you'll feel out of place."}},{"@type":"Question","name":"What are the downsides of Network School?","acceptedAnswer":{"@type":"Answer","text":"Quiet, developing area—not a bustling city. Gender ratio skews 80% male. Some ethnic and language cliques form. Crypto infrastructure is lighter than the marketing suggests. Meal and gym schedules don't accommodate Ramadan. Singapore trips take 1.5–2 hours each way with double immigration. A few members are less social. The heat is relentless. But most people find the tradeoffs worth it for the community, focus, and network."}},{"@type":"Question","name":"What is Society-as-a-Service?","acceptedAnswer":{"@type":"Answer","text":"It's what NS calls itself—an all-in-one package: community, learning, lodging, meals, coworking, fitness, startup opportunities, guest speakers. Instead of piecing together a co-living, a gym, and a coworking space in different cities, it's bundled into one subscription. The idea is that this model can be replicated globally—open-sourced architectural blueprints, clone-stamped like a franchise for startup societies."}},{"@type":"Question","name":"What is \"Willpower-as-a-Service\"?","acceptedAnswer":{"@type":"Answer","text":"NS's term for engineering your environment so peak performance is the default. Modern society optimizes for sedentary behavior and junk food. NS flips it: healthy meals served to you, gym right there with accountability from peers, no distractions from an isolated campus. You don't need individual willpower when the system does it for you. It's the same logic as why it's easier to diet when there's no junk food in the house—scaled to an entire community."}},{"@type":"Question","name":"What's the long-term vision for Network School?","acceptedAnswer":{"@type":"Answer","text":"Phase by phase: v1 was a 128-person 90-day popup (Sept–Dec 2024), capped at Dunbar's Number for high trust. v2 expanded to 256 for a full year starting March 2025. v3 is a permanent campus nearby for 1,024+ people. v4 is global: open-source the architectural blueprints so anyone can clone-stamp a Network School anywhere—like franchising startup societies. The goal is thousands of Network Schools worldwide."}},{"@type":"Question","name":"Will Network School expand to other locations?","acceptedAnswer":{"@type":"Answer","text":"That's the v4 vision—open-source the model globally. Malaysia's heat and distance from the West limits appeal. Japan, South America, Europe, UAE, and Australia have all been mentioned. The Society-as-a-Service model has found product-market fit; the question is execution. No official announcements yet, but the demand is clearly there based on the 4,000+ applications from 80+ countries."}}]}</script>
